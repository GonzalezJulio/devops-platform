name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV

      - name: Login to DockerHub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build -t aresden113/devops-backend:$IMAGE_TAG ./app/server

      - name: Push Docker image
        run: |
          docker push aresden113/devops-backend:$IMAGE_TAG

      - name: Tag as latest (optional)
        run: |
          docker tag aresden113/devops-backend:$IMAGE_TAG aresden113/devops-backend:latest
          docker push aresden113/devops-backend:latest